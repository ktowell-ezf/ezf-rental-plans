<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rental Plans — Wireframes v1 (Low-fi)</title>
<style>
  :root{
    --bg:#eef0f2; --ink:#2b2f36; --muted:#6b7280; --line:#c9ced4;
    --line2:#dfe3e7; --panel:#ffffff; --nav:#2b2f36; --navItem:#aab2bd;
    --navActive:#3a4049; --primary:#3a3f45; --primaryInk:#fff;
    --accent:#cfe8df; --accentLine:#7fb8a3; --danger:#b54a4a;
    --dangerBg:#f7e7e7; --warnBg:#f6efe0; --warnLine:#d8c597;
    --ph:#e3e7ea; --ph2:#eef1f3;
    --radius:6px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.4}
  /* ---- Layout shell of the doc ---- */
  .doc{display:flex;min-height:100vh}
  .index{width:280px;flex:0 0 280px;background:#1f2329;color:#cdd3da;position:sticky;top:0;height:100vh;overflow-y:auto;padding:18px 0}
  .index h1{font-size:14px;margin:0 18px 4px;color:#fff;letter-spacing:.3px}
  .index .sub{font-size:11px;color:#8b939d;margin:0 18px 16px}
  .index .grp{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:#727b85;margin:16px 18px 6px}
  .index a{display:block;padding:7px 18px;color:#c3cad2;text-decoration:none;font-size:12.5px;border-left:3px solid transparent;cursor:pointer}
  .index a:hover{background:#2a2f36;color:#fff}
  .index a.on{background:#2a2f36;color:#fff;border-left-color:#7fb8a3}
  .index .n{display:inline-block;width:30px;color:#6f7882;font-variant-numeric:tabular-nums}
  .stagewrap{flex:1;min-width:0;padding:26px 30px 80px}
  .caption{max-width:1080px;margin:0 auto 14px}
  .caption .crumb{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px}
  .caption h2{margin:3px 0 8px;font-size:20px}
  .caption .notes{background:#fff;border:1px solid var(--line2);border-radius:var(--radius);padding:12px 14px;font-size:12.5px;color:#414750}
  .caption .notes b{color:var(--ink)}
  .caption .notes ul{margin:6px 0 0;padding-left:18px}
  .caption .notes li{margin:3px 0}
  .framewrap{max-width:1080px;margin:0 auto;display:flex;justify-content:center}

  /* ---- Generic wireframe primitives ---- */
  .ph{background:var(--ph);border-radius:3px;display:inline-block}
  .line{height:9px;background:var(--ph);border-radius:3px}
  .skel{background:var(--ph);border-radius:3px}
  .btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;color:var(--ink);padding:6px 12px;border-radius:5px;font-size:12px;cursor:pointer;white-space:nowrap}
  .btn.primary{background:var(--primary);color:#fff;border-color:var(--primary)}
  .btn.green{background:#cfe8df;border-color:#7fb8a3;color:#27583f}
  .btn.sm{padding:4px 9px;font-size:11px}
  .btn.link{border:none;background:none;color:#3f6f5c;padding:0;text-decoration:underline}
  .btn:hover{filter:brightness(.97)}
  .tag{display:inline-block;font-size:10.5px;padding:2px 8px;border-radius:20px;border:1px solid var(--line);background:#f3f5f6;color:#4b5159}
  .tag.green{background:#e7f3ed;border-color:#9cc9b6;color:#2c6347}
  .tag.gray{background:#eceef0;color:#6b7280}
  .tag.amber{background:#f6efe0;border-color:#d8c597;color:#856a2e}
  .tag.red{background:#f7e7e7;border-color:#d8a3a3;color:#9a3b3b}

  /* ---- EZUI admin chrome ---- */
  .ez{width:1040px;height:680px;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden;display:flex;box-shadow:0 8px 30px rgba(20,25,30,.12);position:relative}
  .ez .nav{width:172px;background:var(--nav);color:#aab2bd;flex:0 0 172px;padding:10px 0;font-size:12px}
  .ez .nav .brand{color:#fff;font-weight:600;padding:6px 14px 12px;font-size:13px;letter-spacing:.4px}
  .ez .nav .ni{display:flex;align-items:center;gap:8px;padding:7px 14px;color:#aab2bd}
  .ez .nav .ni .ico{width:14px;height:14px;background:#525a64;border-radius:3px;flex:0 0 14px}
  .ez .nav .ni.on{background:var(--navActive);color:#fff}
  .ez .nav .ni.on .ico{background:#7fb8a3}
  .ez .main{flex:1;display:flex;flex-direction:column;min-width:0}
  .ez .top{height:42px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:10px;padding:0 14px;background:#fbfcfc}
  .ez .top .search{flex:1;max-width:280px;height:24px;background:#eef1f3;border-radius:13px}
  .ez .top .av{width:24px;height:24px;border-radius:50%;background:#d7dde2;margin-left:auto}
  .ez .body{flex:1;overflow:auto;padding:16px 18px;background:#fff}
  .pagehead{display:flex;align-items:center;margin-bottom:12px}
  .pagehead h3{margin:0;font-size:17px}
  .pagehead .acts{margin-left:auto;display:flex;gap:8px}
  .filters{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:6px;overflow:hidden}
  .seg span{padding:5px 12px;font-size:12px;color:var(--muted);border-right:1px solid var(--line);cursor:pointer}
  .seg span:last-child{border-right:none}
  .seg span.on{background:var(--primary);color:#fff}
  .inp{height:30px;border:1px solid var(--line);border-radius:5px;background:#fff;display:flex;align-items:center;padding:0 9px;color:var(--muted);font-size:12px;min-width:160px}
  /* table */
  table.tbl{width:100%;border-collapse:collapse;font-size:12px}
  table.tbl th{text-align:left;font-weight:600;color:#5b626b;border-bottom:1px solid var(--line);padding:8px 8px;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  table.tbl td{border-bottom:1px solid var(--line2);padding:9px 8px;color:#3c4249;vertical-align:middle}
  table.tbl tr:hover td{background:#f7f9f9}
  .rowact{display:flex;gap:5px;align-items:center}
  .rowact .i{display:inline-flex;align-items:center;padding:3px 9px;border:1px solid var(--line);border-radius:4px;background:#fff;color:var(--muted);font-size:11px;cursor:pointer;white-space:nowrap}
  .rowact .i::before{content:attr(title)}
  .rowact .i:hover{background:#f3f5f6;color:var(--ink)}
  .pager{display:flex;gap:5px;justify-content:flex-end;margin-top:12px}
  .pager .pg{width:24px;height:24px;border:1px solid var(--line);border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--muted)}
  .pager .pg.on{background:var(--primary);color:#fff;border-color:var(--primary)}

  /* ---- Side panel overlay ---- */
  .dim{position:absolute;inset:0;background:rgba(30,34,40,.34)}
  .panel{position:absolute;top:0;right:0;height:100%;width:430px;background:#fff;box-shadow:-6px 0 24px rgba(20,25,30,.18);display:flex;flex-direction:column}
  .panel.wide{width:520px}
  .panel .ph-head{display:flex;align-items:center;padding:13px 16px;border-bottom:1px solid var(--line2)}
  .panel .ph-head h4{margin:0;font-size:15px}
  .panel .x{margin-left:auto;width:22px;height:22px;border-radius:5px;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:#7a828c;cursor:pointer}
  .ptabs{display:flex;gap:2px;padding:0 14px;border-bottom:1px solid var(--line2);background:#fbfcfc}
  .ptabs span{padding:9px 12px;font-size:12px;color:var(--muted);border-bottom:2px solid transparent;cursor:pointer}
  .ptabs span.on{color:var(--ink);border-bottom-color:#7fb8a3;font-weight:600}
  .pbody{flex:1;overflow:auto;padding:16px}
  .pfoot{border-top:1px solid var(--line2);padding:12px 16px;display:flex;align-items:center;gap:10px}
  .pfoot .sp{margin-left:auto}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:11.5px;color:#5b626b;margin-bottom:5px;font-weight:600}
  .field .ctl{height:32px;border:1px solid var(--line);border-radius:5px;background:#fff;display:flex;align-items:center;padding:0 10px;color:#9aa1aa;font-size:12px}
  .field .ctl.area{height:60px;align-items:flex-start;padding-top:8px}
  .field.row2{display:flex;gap:12px}
  .field.row2 .field{flex:1;margin-bottom:0}
  .sech{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:#7a828c;margin:6px 0 10px;border-bottom:1px solid var(--line2);padding-bottom:6px}
  .radio{display:flex;align-items:flex-start;gap:9px;border:1px solid var(--line);border-radius:6px;padding:10px 12px;margin-bottom:9px;cursor:pointer}
  .radio.on{border-color:#7fb8a3;background:#f3faf6}
  .radio .dot{width:15px;height:15px;border-radius:50%;border:2px solid #b6bdc5;flex:0 0 15px;margin-top:1px}
  .radio.on .dot{border-color:#4f9a7c;background:radial-gradient(#4f9a7c 38%,#fff 42%)}
  .radio .t{font-size:12.5px}
  .radio .t b{display:block;margin-bottom:2px}
  .radio .t span{color:var(--muted);font-size:11.5px}
  .toggle{width:34px;height:19px;border-radius:12px;background:#cfd5db;position:relative;flex:0 0 34px}
  .toggle::after{content:"";position:absolute;width:15px;height:15px;border-radius:50%;background:#fff;top:2px;left:2px}
  .toggle.on{background:#7fb8a3}
  .toggle.on::after{left:17px}
  .rowflex{display:flex;align-items:center;gap:10px}
  .banner{border-radius:6px;padding:11px 12px;font-size:12.5px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
  .banner .bi{width:16px;height:16px;border-radius:50%;flex:0 0 16px;margin-top:1px}
  .banner.danger{background:var(--dangerBg);border:1px solid #e0b4b4;color:#7e3636}
  .banner.danger .bi{background:#b54a4a}
  .banner.warn{background:var(--warnBg);border:1px solid var(--warnLine);color:#735c25}
  .banner.warn .bi{background:#c79f47}
  .banner.info{background:#e9f1f6;border:1px solid #b6cfe0;color:#3c5a70}
  .banner.info .bi{background:#5d86a6}
  .banner.ok{background:#e7f3ed;border:1px solid #9cc9b6;color:#2c6347}
  .tip-wrap{position:relative;display:inline-flex;align-items:center}
  .tip-wrap .tip-bubble{display:none;position:absolute;left:50%;transform:translateX(-50%);bottom:calc(100% + 6px);background:#2b2f36;color:#fff;font-size:11px;line-height:1.4;padding:6px 9px;border-radius:5px;white-space:nowrap;max-width:240px;white-space:normal;z-index:999;pointer-events:none}
  .tip-wrap:hover .tip-bubble{display:block}
  .banner.ok .bi{background:#4f9a7c}
  .kv{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px dashed var(--line2);font-size:12.5px}
  .kv:last-child{border-bottom:none}
  .kv .k{color:var(--muted)}
  .note-anchor{font-size:10.5px;color:#9aa1aa;font-style:italic;border:1px dashed var(--line);border-radius:5px;padding:8px 10px;background:#fafbfb;margin-bottom:12px}

  /* iframe placeholder */
  .iframe-stub{border:2px dashed var(--line);border-radius:8px;background:repeating-linear-gradient(45deg,#fafbfb,#fafbfb 10px,#f1f3f5 10px,#f1f3f5 20px);height:230px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:#8a929b;text-align:center;padding:16px}

  /* modal */
  .modal{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .modal .card{width:380px;background:#fff;border-radius:10px;box-shadow:0 16px 50px rgba(20,25,30,.3);padding:18px}
  .modal .card h4{margin:0 0 8px;font-size:15px}
  .modal .card p{margin:0 0 14px;color:#4b5159;font-size:12.5px}
  .modal .acts{display:flex;gap:8px;justify-content:flex-end}

  /* toast */
  .toast{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:#2b2f36;color:#fff;border-radius:8px;padding:11px 16px;font-size:12.5px;display:flex;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(0,0,0,.25);max-width:520px}
  .toast .ck{width:18px;height:18px;border-radius:50%;background:#4f9a7c;flex:0 0 18px}

  /* ---- Client Self-Service portal chrome ---- */
  .ss{width:1040px;height:680px;background:#f4f6f8;border:1px solid var(--line);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 30px rgba(20,25,30,.12);position:relative}
  .ss .top{height:52px;background:#fff;border-bottom:1px solid var(--line2);display:flex;align-items:center;padding:0 22px;gap:22px}
  .ss .top .logo{width:96px;height:20px;background:#dfe4e8;border-radius:4px}
  .ss .top .navi{display:flex;gap:20px;font-size:12.5px;color:#6b7280}
  .ss .top .navi b{color:#2b2f36;border-bottom:2px solid #7fb8a3;padding-bottom:16px}
  .ss .top .acct{margin-left:auto;width:30px;height:30px;border-radius:50%;background:#dfe4e8}
  .ss .body{flex:1;overflow:auto;padding:24px 32px}
  .ss .body.narrow{max-width:760px;margin:0 auto;width:100%}
  .ss h3{margin:0 0 4px;font-size:20px}
  .ss .lead{color:var(--muted);font-size:13px;margin:0 0 20px}
  .cardgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .pcard{background:#fff;border:1px solid var(--line2);border-radius:10px;padding:16px;display:flex;flex-direction:column;gap:8px}
  .pcard .ph-t{font-size:14px;font-weight:600}
  .pcard .price{font-size:22px;font-weight:700}
  .pcard .price small{font-size:11px;color:var(--muted);font-weight:400}
  .pcard .meta{font-size:11.5px;color:var(--muted)}
  .pcard ul{margin:4px 0 0;padding-left:16px;font-size:12px;color:#4b5159}
  .pcard ul li{margin:3px 0}
  .plancard-lg{background:#fff;border:1px solid var(--line2);border-radius:12px;padding:22px}
  .balbar{height:10px;border-radius:6px;background:#e7ebee;overflow:hidden;margin:6px 0}
  .balbar i{display:block;height:100%;background:#7fb8a3}
  .myplan{background:#fff;border:1px solid var(--line2);border-radius:10px;padding:16px 18px;margin-bottom:12px;display:flex;align-items:center;gap:18px}
  .myplan .pp{flex:1}
  .empty{background:#fff;border:1px dashed var(--line);border-radius:12px;padding:46px;text-align:center;color:var(--muted)}
  .empty .icon{width:46px;height:46px;border-radius:10px;background:#eceef0;margin:0 auto 14px}

  /* ---- Email mock ---- */
  .emailwrap{width:680px;background:#eceff2;border:1px solid var(--line);border-radius:8px;padding:26px;box-shadow:0 8px 30px rgba(20,25,30,.12)}
  .emailmeta{font-size:11.5px;color:#6b7280;margin-bottom:12px}
  .emailmeta b{color:#2b2f36}
  .email{background:#fff;border:1px solid var(--line2);border-radius:8px;overflow:hidden}
  .email .ehead{background:#2b2f36;height:54px;display:flex;align-items:center;padding:0 22px}
  .email .ehead .logo{width:110px;height:20px;background:#525a64;border-radius:4px}
  .email .ebody{padding:24px}
  .email h4{margin:0 0 12px;font-size:17px}
  .email p{margin:0 0 12px;color:#4b5159;font-size:13px}
  .email .box{border:1px solid var(--line2);border-radius:8px;padding:14px 16px;margin:14px 0;background:#fbfcfc}
  .email .efoot{padding:16px 24px;border-top:1px solid var(--line2);font-size:11px;color:#9aa1aa}

  .stage-note{max-width:1080px;margin:14px auto 0;font-size:11.5px;color:#9aa1aa;text-align:center}
  .hidden{display:none}
  .flowhint{position:absolute;top:8px;right:10px;font-size:10px;color:#aeb5bd;background:#fff;border:1px solid var(--line2);border-radius:20px;padding:3px 9px}
  @media print{.index{display:none}}

  /* ── Rental Plans search / filter controls ── */
  .rp-search-wrap{position:relative;display:flex;align-items:center}
  .rp-search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:#9aa1aa;font-size:14px;pointer-events:none}
  .rp-search-input{height:30px;border:1px solid var(--line);border-radius:5px;background:#fff;padding:0 28px;font-size:12px;color:var(--ink);min-width:190px;outline:none;font-family:inherit}
  .rp-search-input:focus{border-color:#7fb8a3}
  .rp-search-input::placeholder{color:#9aa1aa}
  .rp-search-clear{position:absolute;right:7px;top:50%;transform:translateY(-50%);width:16px;height:16px;border-radius:50%;background:#9aa1aa;color:#fff;border:none;cursor:pointer;font-size:9px;display:none;align-items:center;justify-content:center;padding:0;line-height:1}
  .rp-search-wrap.has-value .rp-search-clear{display:flex}
  .rp-search-wrap.has-value .rp-search-input{padding-right:30px}
  .rp-filter-wrap{position:relative}
  .rp-filter-btn{display:inline-flex;align-items:center;gap:5px;height:30px;border:1px solid var(--line);border-radius:5px;background:#fff;color:var(--ink);padding:0 10px;font-size:12px;cursor:pointer;font-family:inherit}
  .rp-filter-btn.active{border-color:#7fb8a3;color:#27583f;background:#f3faf6}
  .rp-filter-btn:hover{border-color:#9aa1aa}
  .rp-filter-badge{display:inline-flex;align-items:center;justify-content:center;min-width:16px;height:16px;border-radius:9px;background:#7fb8a3;color:#fff;font-size:10px;font-weight:700;padding:0 4px}
  .rp-filter-popover{display:none;position:absolute;top:calc(100% + 6px);right:0;background:#fff;border:1px solid var(--line);border-radius:6px;box-shadow:0 4px 18px rgba(20,25,30,.14);z-index:9999;min-width:240px}
  .rp-filter-popover.open{display:block}
  .rp-filter-section{padding:10px 14px 8px}
  .rp-filter-label{font-size:10.5px;font-weight:600;color:#5b626b;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
  .rp-filter-options{display:flex;flex-direction:column;gap:2px}
  .rp-filter-option{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink);padding:3px 0;cursor:pointer}
  .rp-filter-option input{cursor:pointer;accent-color:#4f9a7c}
  .rp-filter-divider{border:none;border-top:1px solid var(--line2);margin:2px 0 4px}
  .rp-price-range{display:flex;align-items:center;gap:6px}
  .rp-price-wrap{display:flex;align-items:center;border:1px solid var(--line);border-radius:5px;background:#fff;padding:0 8px;height:28px;gap:3px}
  .rp-price-wrap:focus-within{border-color:#7fb8a3}
  .rp-cur{font-size:12px;color:#9aa1aa}
  .rp-price-input{border:none;background:none;width:58px;font-size:12px;outline:none;color:var(--ink);font-family:inherit}
  .rp-price-input::placeholder{color:#c0c5cb}
  .rp-date-input{height:28px;border:1px solid var(--line);border-radius:5px;background:#fff;font-size:12px;color:var(--ink);padding:0 8px;outline:none;font-family:inherit;flex:1}
  .rp-date-input:focus{border-color:#7fb8a3}
  .rp-range-sep{color:#9aa1aa;font-size:11px;flex-shrink:0}
  .rp-filter-footer{padding:4px 14px 12px;display:flex;justify-content:flex-end}
  .rp-filter-clear-btn{border:none;background:none;font-size:12px;color:#6b7280;cursor:pointer;padding:4px 0;font-family:inherit}
  .rp-filter-clear-btn:hover{color:var(--ink)}
  /* history tab */
  .history-list{display:flex;flex-direction:column}
  .history-entry{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--line2)}
  .history-entry:last-child{border-bottom:none}
  .history-av{width:26px;height:26px;border-radius:50%;background:#7fb8a3;color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex:0 0 26px;margin-top:1px}
  .history-av.muted{background:#9aa1aa}
  .history-user{font-size:12px;font-weight:600;color:var(--ink)}
  .history-time{font-size:11px;color:var(--muted);margin-left:6px}
  .history-field-row{display:flex;align-items:center;gap:5px;font-size:12px;flex-wrap:wrap;margin-top:4px}
  .history-fn{color:var(--muted);min-width:90px;flex-shrink:0;font-size:11.5px}
  .history-old{text-decoration:line-through;color:var(--muted);opacity:.75}
  .history-arrow{color:var(--muted);font-size:10px}
  .history-created{font-size:12px;color:var(--muted);font-style:italic;margin-top:3px}
  /* interactive form controls inside panels */
  .form-ctrl{height:32px;border:1px solid var(--line);border-radius:5px;background:#fff;padding:0 10px;font-size:12px;color:var(--ink);font-family:inherit;width:100%;box-sizing:border-box;outline:none}
  .form-ctrl:focus{border-color:#7fb8a3}
  .form-ctrl.area{height:60px;padding:8px 10px;resize:vertical;vertical-align:top;line-height:1.4}
  select.form-ctrl{cursor:pointer}
  .form-ctrl:disabled{opacity:.45;cursor:not-allowed;background:#f5f6f7}
  .inline-row{display:flex;align-items:center;gap:8px}
  .add-trigger-box{border:1px solid var(--line);border-radius:5px;padding:10px 12px;margin-bottom:10px;display:flex;flex-direction:column;gap:8px}

const navItems = ['Dashboard','Schedule','Clients','Invoicing','Reports','Rental Plans','Membership Plans','Setup'];
function ezChrome(active, bodyHTML, overlay=''){
  const ni = navItems.map(n=>`<div class="ni ${n===active?'on':''}"><span class="ico"></span>${n}</div>`).join('');
  return `<div class="ez">
    <div class="nav"><div class="brand">EZFacility</div>${ni}</div>
    <div class="main">
      <div class="top"><div class="search"></div><div class="av"></div></div>
      <div class="body">${bodyHTML}</div>
    </div>
    ${overlay}
  </div>`;
}
function ssChrome(active, bodyHTML, overlay='', narrow=false){
  const items = ['Book','Plans','My Account'];
  const navi = items.map(n=> n===active?`<b>${n}</b>`:n).join('');
  return `<div class="ss">
    <div class="top"><div class="logo"></div><div class="navi">${navi}</div><div class="acct"></div></div>
    <div class="body ${narrow?'narrow':''}">${bodyHTML}</div>
    ${overlay}
  </div>`;
}
function panel(opts){
  const tabs = (opts.tabs||[]).map(t=>`<span class="${t.on?'on':''}" ${t.onclick?`onclick="${t.onclick}" style="cursor:pointer"`:''}>${t.label}</span>`).join('');
  const ct = opts.closeTarget || '';
  return `<div class="dim" onclick="panelTryClose()"></div>
   <div class="panel ${opts.wide?'wide':''}" id="sidePanel" data-close-target="${ct}">
     <div class="ph-head"><h4>${opts.title}</h4><div class="x" onclick="panelTryClose()" style="cursor:pointer;">✕</div></div>
     ${tabs?`<div class="ptabs">${tabs}</div>`:''}
     <div class="pbody">${opts.body}</div>
     <div class="pfoot">${opts.foot}</div>
   </div>`;
}
function modal(opts){
  return `<div class="dim"></div><div class="modal"><div class="card">
    <h4>${opts.title}</h4><p>${opts.body}</p><div class="acts">${opts.acts}</div></div></div>`;
}

      <div class="kv"><span class="k">Renews as</span><span>${p.renewAs||'A copy of itself'}</span></div>` : '';
    return ezChrome('Rental Plans',

screens['s-plan-edit-history'] = {
  group:'1 · Staff Sales', n:'1.1', crumb:'EZUI Admin · Staff', title:'Edit Plan — History',
  hideNav:true,
  render:()=>{
    const p = rpCurrentPlan || {};
    const entries = [
      {initials:'KT', user:'K. Towell', time:'May 9, 2026 · 3:42 PM',
        changes:[{field:'Status', old:'Unavailable', val:'Available'},{field:'Auto-Renew', old:'Disabled', val:'Enabled'}]},
      {initials:'MR', user:'M. Rodriguez', time:'Apr 22, 2026 · 10:15 AM',
        changes:[{field:'Std. Price', old:'$14 / hr', val:'$18 / hr'},{field:'Mbr. Price', old:'$10 / hr', val:'$14 / hr'}]},
      {initials:'KT', user:'K. Towell', time:'Mar 5, 2026 · 9:00 AM',
        changes:[{field:'Expiration', old:'90 days', val:'None'}]},
      {initials:'KT', user:'K. Towell', time:'Jan 14, 2026 · 2:30 PM', created:true}
    ];
    const historyHTML = entries.map(e=>{
      if(e.created) return `<div class="history-entry"><div class="history-av muted">${e.initials}</div><div><div><span class="history-user">${e.user}</span><span class="history-time">${e.time}</span></div><div class="history-created">Plan created</div></div></div>`;
      const changes = e.changes.map(c=>`<div class="history-field-row"><span class="history-fn">${c.field}</span><span class="history-old">${c.old}</span><span class="history-arrow">→</span><span>${c.val}</span></div>`).join('');
      return `<div class="history-entry"><div class="history-av">${e.initials}</div><div><div><span class="history-user">${e.user}</span><span class="history-time">${e.time}</span></div>${changes}</div></div>`;
    }).join('');
    return ezChrome('Rental Plans',
      rpListBody(),
      panel({closeTarget:'s-list', title: p.name||'Edit Plan',
        tabs:[
          {label:'Plan Details', onclick:"go('s-plan-edit')"},
          {label:'Pricing', onclick:"go('s-plan-edit-pricing')"},
          {label:'History', on:true}
        ],
        body:`<div class="sech">Change History</div><div class="history-list">${historyHTML}</div>`,
        foot:`<span class="sp"></span><span class="btn" onclick="panelTryClose()">Close</span>`})
    );
  }
};

    const tax = (priceNum * 0.08).toFixed(2);

    // Compute mock expiry date

            <div style="display:flex;gap:6px"><span class="btn sm" style="opacity:.5">Next &#8250;</span><span class="btn sm" style="opacity:.5">&#187;</span></div>
          </div>`;
        foot = `<span class="btn" onclick="rsBookSelected()">Cancel</span><span class="sp"></span><span class="btn primary" style="${overLimit?'opacity:.4;pointer-events:none':''}" onclick="${overLimit?'':'rsBookSelected()'}">Book Selected</span>`;
      } else if(bksell.active){
        body = head2 + bksellBodyHTML();
        foot = `<span class="btn" onclick="panelTryClose()">Cancel</span>`;
      } else {

        const rsSel = bk2.method==='rs';
        const rsTooltip = `<span class="tip-wrap" style="margin-left:5px"><span style="display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;background:#6b7280;color:#fff;font-size:10px;cursor:help;line-height:1;font-style:italic;font-family:serif">i</span><span class="tip-bubble">Occurrences will be auto-selected from soonest to latest available.</span></span>`;

          <div style="font-size:11.5px;color:#6b7280;margin-bottom:5px">Apply to</div>

              <option value="custom" ${rs.occMode==='custom'?'selected':''}>Custom</option>
            </select>
            ${rs.occMode==='remaining'?rsTooltip:''}
          </div>
          ${rs.occMode==='custom'?`<div style="margin-top:6px;font-size:11.5px;color:#4b5159">${rs.customSessions.length} session${rs.customSessions.length!==1?'s':''} selected — <span style="color:#4f9a7c;cursor:pointer;text-decoration:underline" onclick="rsSetMode('custom')">Edit</span></div>`:''}

        const rsCard = `<div class="radio${rsSel?' on':''}" onclick="rsSelect()" style="cursor:pointer;align-items:flex-start">

      }

      panel({closeTarget:'sch-insufficient', title:'New Rental · Court 3', wide:rs.modalOpen,
        tabs:[{label:'Details', onclick:"go('sch-choice')"},mk('billing','Billing'),mk('linked','Linked'),mk('history','History')],

  let html='', lastGroup=null;

var rpSearchQuery = '';
var rpFilterStatus = new Set();
var rpFilterModel = new Set();
var rpFilterStdMin = null, rpFilterStdMax = null;
var rpFilterMemMin = null, rpFilterMemMax = null;
var rpFilterStartFrom = null, rpFilterStartTo = null;

function rpOnSearch(val) {
  rpSearchQuery = val.trim().toLowerCase();
  document.getElementById('rpSearchWrap')?.classList.toggle('has-value', val.length > 0);
  rpApplyFilters();
}
function rpClearMainSearch() {
  var si = document.getElementById('rpSearchInput');
  if (si) { si.value = ''; }
  rpOnSearch('');
  if (si) si.focus();
}
function rpToggleFilterPopover(e) {
  e.stopPropagation();
  var pop = document.getElementById('rpFilterPopover');
  if (!pop) return;
  if (pop.classList.contains('open')) { rpCloseFilterPopover(); }
  else { pop.classList.add('open'); rpSyncFilterBtn(); }
}
function rpCloseFilterPopover() {
  var pop = document.getElementById('rpFilterPopover');
  if (pop) pop.classList.remove('open');
  rpSyncFilterBtn();
}
function rpSyncFilterBtn() {
  var priceActive = rpFilterStdMin !== null || rpFilterStdMax !== null || rpFilterMemMin !== null || rpFilterMemMax !== null;
  var startActive = rpFilterStartFrom !== null || rpFilterStartTo !== null;
  var total = rpFilterStatus.size + rpFilterModel.size + (priceActive ? 1 : 0) + (startActive ? 1 : 0);
  var btn = document.getElementById('rpFilterBtn');
  var badge = document.getElementById('rpFilterBadge');
  if (!btn || !badge) return;
  btn.classList.toggle('active', total > 0);
  if (total > 0) { badge.style.display = 'inline-flex'; badge.textContent = total; }
  else { badge.style.display = 'none'; }
}
function rpOnFilterChange() {
  rpFilterStatus.clear(); rpFilterModel.clear();
  ['Available','Unavailable'].forEach(function(v) { if (document.getElementById('rpF-'+v)?.checked) rpFilterStatus.add(v); });
  ['Hours','Occurrences'].forEach(function(v) { if (document.getElementById('rpF-'+v)?.checked) rpFilterModel.add(v); });
  var toNum = function(id) { var el = document.getElementById(id); var v = el ? el.value : ''; return (v !== '') ? parseFloat(v) : null; };
  var toDate = function(id) { var el = document.getElementById(id); return (el && el.value) ? el.value : null; };
  rpFilterStdMin = toNum('rpFStdMin'); rpFilterStdMax = toNum('rpFStdMax');
  rpFilterMemMin = toNum('rpFMemMin'); rpFilterMemMax = toNum('rpFMemMax');
  rpFilterStartFrom = toDate('rpFStartFrom'); rpFilterStartTo = toDate('rpFStartTo');
  rpSyncFilterBtn();
  rpApplyFilters();
}
function rpClearFilters() {
  rpFilterStatus.clear(); rpFilterModel.clear();
  rpFilterStdMin = null; rpFilterStdMax = null; rpFilterMemMin = null; rpFilterMemMax = null;
  rpFilterStartFrom = null; rpFilterStartTo = null;
  ['rpF-Available','rpF-Unavailable','rpF-Hours','rpF-Occurrences'].forEach(function(id) {
    var el = document.getElementById(id); if (el) el.checked = false;
  });
  ['rpFStdMin','rpFStdMax','rpFMemMin','rpFMemMax','rpFStartFrom','rpFStartTo'].forEach(function(id) {
    var el = document.getElementById(id); if (el) el.value = '';
  });
  rpSyncFilterBtn();
  rpApplyFilters();
}
function rpRowMatchesFilters(row) {
  var name   = (row.dataset.name   || '');
  var status = (row.dataset.status || '');
  var model  = (row.dataset.model  || '');
  var stdRaw = row.dataset.std;
  var memRaw = row.dataset.mem;
  var start  = (row.dataset.start  || '');
  var std = (stdRaw !== '' && stdRaw != null) ? parseFloat(stdRaw) : null;
  var mem = (memRaw !== '' && memRaw != null) ? parseFloat(memRaw) : null;

  if (rpSearchQuery && name.indexOf(rpSearchQuery) === -1) return false;
  if (rpFilterStatus.size > 0 && !rpFilterStatus.has(status)) return false;
  if (rpFilterModel.size  > 0 && !rpFilterModel.has(model))   return false;
  if (rpFilterStdMin  !== null && (std === null || std < rpFilterStdMin))  return false;
  if (rpFilterStdMax  !== null && (std === null || std > rpFilterStdMax))  return false;
  if (rpFilterMemMin  !== null && (mem === null || mem < rpFilterMemMin))  return false;
  if (rpFilterMemMax  !== null && (mem === null || mem > rpFilterMemMax))  return false;

}
function rpApplyFilters() {
  var grids = [
    { id: 'rp-active-grid',   tab: 'active'   },
    { id: 'rp-archived-grid', tab: 'archived' }
  ];
  grids.forEach(function(g) {
    var grid = document.getElementById(g.id);
    if (!grid) return;
    var rows = Array.from(grid.querySelectorAll('tbody tr'));
    var visible = 0;
    rows.forEach(function(row) {
      var show = rpRowMatchesFilters(row);
      row.style.display = show ? '' : 'none';
      if (show) visible++;
    });
    if (g.tab === rpCurrentTab) {
      var lbl = document.getElementById('rp-count-lbl');
      var sel = rows.filter(function(r){ return r.querySelector('.rp-row-cb')?.checked; }).length;
      if (lbl && sel === 0) lbl.textContent = visible + ' plan' + (visible !== 1 ? 's' : '');
    }
  });
}

      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:14px;font-size:11.5px;color:#6b7280">
      <div style="display:flex;gap:6px"><span class="btn sm" style="opacity:.5">&#171;</span><span class="btn sm" style="opacity:.5">&#8249; Previous</span></div>
      <div style="display:flex;align-items:center;gap:8px"><span class="pg on">1</span><select class="form-ctrl" style="width:auto;padding:2px 6px"><option>20</option><option>50</option><option>100</option></select></div>
      <div style="display:flex;gap:6px"><span class="btn sm" style="opacity:.5">Next &#8250;</span><span class="btn sm" style="opacity:.5">&#187;</span></div>
    </div>`;
}

/* Filter chips (Show all / Rental Plans / Rental Rates) + payment-method error, shared by 2.1 and 2.2 */
function bkFilterChips(active, fn){
  const chip = (f,lbl)=>`<span class="${active===f?'on':''}" onclick="${fn}('${f}')" style="cursor:pointer">${lbl}</span>`;
  return `<div class="seg" style="margin-bottom:10px">${chip('all','Show all')}${chip('plans','Rental Plans')}${chip('rates','Rental Rates')}</div>`;
}
function bkPayError(show){
  return show ? `<div style="color:#b54a4a;font-size:11.5px;margin-bottom:8px;display:flex;align-items:center;gap:5px"><span>&#9888;&#65039;</span> Select a payment method to continue.</div>` : '';
}
function bkClientError(show){
  return show ? `<div style="color:#b54a4a;font-size:11.5px;margin-top:6px;display:flex;align-items:center;gap:5px"><span>&#9888;&#65039;</span> Select a client to continue.</div>` : '';
}

/* ---- Inline Sell-a-Plan flow (runs inside the schedule Billing tab, replacing Payment method) ---- */
var bksell = { active:false, step:'select', planId:null, autoRenew:false, ret:'sch-choice', client:'' };
function bksellStart(ret, client){ bksell = {active:true, step:'select', planId:null, autoRenew:false, ret:ret, client:client||''}; go(ret); }
function bksellBack(){ if(bksell.step==='pay'){ bksell.step='select'; } else { bksell.active=false; } go(bksell.ret); }
function bksellPickPlan(id){ bksell.planId = id; go(bksell.ret); }
function bksellToggleAR(){ bksell.autoRenew = !bksell.autoRenew; go(bksell.ret); }
function bksellToPay(){ if(bksell.planId){ bksell.step='pay'; go(bksell.ret); } }
function bksellCharge(){ bksell.step='confirm'; go(bksell.ret); }
function bksellDone(){
  const p = rpPlanData[bksell.planId];
  if(p){
    const np = { planId: parseInt(bksell.planId), name:p.name, model:p.model, unit:(p.model==='Per Hour'?'hrs':'plays'), balance: parseFloat(p.qtyNum), total: parseFloat(p.qtyNum) };
    if(bksell.ret==='sch-choice' && bk.client){
      if(!bk.client.plans.some(x=>x.planId===np.planId)) bk.client.plans.push(np);
      bk.method = 'plan:'+np.planId; bk.payError = null;
    } else if(bksell.ret==='sch-insufficient'){
      if(!bk2.extraPlans.some(x=>x.planId===np.planId)) bk2.extraPlans.push(np);
      bk2.method = 'plan:'+np.planId; bk2.payError = false;
    }
  }
  bksell.active=false; go(bksell.ret);
}
/* Renders a usable plan option row (shared) */
function bkPlanRow(p, reqHrs, selected, pickFn){
  const sel = selected===('plan:'+p.planId);
  let detail;
  if(p.model==='Per Hour'){ const left=(p.balance-reqHrs).toFixed(1); detail=`${p.balance.toFixed(1)} hrs available · deducts <b>${reqHrs.toFixed(1)} hrs</b> → ${left} hrs left`; }
  else { detail=`${p.balance} plays available · deducts <b>1 play</b> regardless of duration → ${p.balance-1} plays left`; }
  return `<div class="radio${sel?' on':''}" onclick="${pickFn}('plan:${p.planId}')" style="cursor:pointer"><span class="dot"></span><div class="t"><b>Use plan — ${p.name}</b><span>${detail}</span></div></div>`;
}
function bk2ExtraPlansHTML(){ return bk2.extraPlans.map(p=>bkPlanRow(p, 3.0, bk2.method, 'bk2PickMethod')).join(''); }
function bksellBodyHTML(){
  const back = `<div style="margin-bottom:10px"><span class="btn link" style="cursor:pointer" onclick="bksellBack()">&#8249; Back</span></div>`;
  if(bksell.step==='select'){
    const cards = Object.entries(rpPlanData).filter(([id,p])=>!p.archived).map(([id,p])=>{
      const sel = String(bksell.planId)===String(id);
      const qtyStr = p.model==='Per Hour' ? `${p.qtyNum} hrs` : `${p.qtyNum} occurrences`;
      const expStr = p.expiry==='No expiration' ? 'no expiry' : `expires ${p.expiry} from purchase`;
      return `<div class="radio${sel?' on':''}" onclick="bksellPickPlan(${id})" style="cursor:pointer">
        <span class="dot"></span><div class="t"><b>${p.name}</b><span>${qtyStr} · ${expStr}</span></div>
        <div class="sell-plan-price"><b>${p.stdPrice}</b></div></div>`;
    }).join('');
    const canCont = !!bksell.planId;
    return back + `<div class="wf-note">Inline <b>Sell a Plan</b> flow — same select → payment → confirm steps as <i>1.3 Sell a Plan</i>, selling to ${bksell.client||'this client'}.</div>
      <div class="sech">Select a plan</div>${cards}
      <div class="field" style="margin-top:14px;margin-bottom:0"><label>Auto-renew</label>
        <div class="rowflex"><span class="toggle${bksell.autoRenew?' on':''}" onclick="bksellToggleAR()" style="cursor:pointer"></span><span style="color:#6b7280;font-size:12px">${bksell.autoRenew?'Renew automatically when balance is depleted':'Off — client can opt in later'}</span></div>
      </div>
      <div style="margin-top:16px"><span class="btn primary" style="width:100%;justify-content:center;opacity:${canCont?1:.4};${canCont?'':'pointer-events:none'}" onclick="bksellToPay()">Continue to payment</span></div>`;
  }
  if(bksell.step==='pay'){
    const p = rpPlanData[bksell.planId];
    const priceNum = parseFloat(p.stdPriceNum||0);
    const tax = (priceNum*0.08).toFixed(2);
    const total = (priceNum+parseFloat(tax)).toFixed(2);
    return back + `<div class="sech">Order summary</div>
      <div class="kv"><span class="k">Client</span><span>${bksell.client}</span></div>
      <div class="kv"><span class="k">Plan</span><span>${p.name}</span></div>
      <div class="kv"><span class="k">Price</span><span>${p.stdPrice}</span></div>
      <div class="kv"><span class="k">Tax (8%)</span><span>$${tax}</span></div>
      <div class="kv" style="border-bottom:none"><span style="font-weight:600">Total</span><span style="font-weight:700">$${total}</span></div>
      <div class="sech" style="margin-top:16px">Payment</div>
      <div class="iframe-stub"><div class="ph" style="width:120px;height:14px"></div><div>Existing EZUI payment iframe<br/>(card / saved method / terminal)</div></div>
      <div style="margin-top:14px"><span class="btn primary" style="width:100%;justify-content:center" onclick="bksellCharge()">Charge $${total}</span></div>`;
  }
  // confirm
  const p = rpPlanData[bksell.planId];
  const balStr = p.model==='Per Hour' ? `${p.qtyNum}.0 / ${p.qtyNum} hrs` : `${p.qtyNum} / ${p.qtyNum} occurrences`;
  return `<div class="banner ok"><span class="bi"></span><div><b>Plan sold to ${bksell.client}.</b> Balance is available now.</div></div>
    <div class="plancard-lg" style="border-radius:8px;padding:16px">
      <div style="font-weight:600;font-size:14px;margin-bottom:8px">${p.name}</div>
      <div class="kv"><span class="k">Balance</span><span><b>${balStr}</b></span></div>
      <div class="kv"><span class="k">Status</span><span><span class="tag green">Active</span></span></div>
      <div class="kv" style="border-bottom:none"><span class="k">Auto-renew</span><span>${bksell.autoRenew?'On':'Off'}</span></div>
    </div>
    <div style="margin-top:16px"><span class="btn primary" style="width:100%;justify-content:center" onclick="bksellDone()">Done — back to payment</span></div>`;
}

/* ---- 2.4 Plans tab — Share a plan ---- */
var famShareOpen = false;
var famSharePlan = { name:'', bal:'' };
var famRelChecked = new Set();
var famShares = [];
function famOpenShare(name, bal){ famShareOpen = true; famSharePlan = {name, bal}; go('sch-family'); }
function famCloseShare(){ famShareOpen = false; go('sch-family'); }
function famToggleRel(n){ if(famRelChecked.has(n)) famRelChecked.delete(n); else famRelChecked.add(n); go('sch-family'); }
function famAddShare(){ var el=document.getElementById('fam-share-input'); var v=el?el.value.trim():''; if(v) famShares.push(v); go('sch-family'); }
function famRemoveShare(i){ famShares.splice(i,1); go('sch-family'); }
function famSharePanel(){
  const rels = [{name:'Sam Lee',rel:'Spouse'},{name:'Riley Lee',rel:'Child'},{name:'Alex Lee',rel:'Child'}];
  const relHTML = rels.map(r=>`<label style="display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid var(--line2);font-size:12.5px;cursor:pointer">
      <input type="checkbox" ${famRelChecked.has(r.name)?'checked':''} onchange="famToggleRel('${r.name}')" style="accent-color:#4f9a7c;width:15px;height:15px">
      <span><b>${r.name}</b> <span style="color:#6b7280">· ${r.rel}</span></span>
    </label>`).join('');
  const sharesHTML = famShares.length
    ? famShares.map((n,i)=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border:1px solid var(--line2);border-radius:5px;margin-bottom:6px;font-size:12.5px"><span>${n}</span><span style="color:#b54a4a;cursor:pointer;font-size:11px" onclick="famRemoveShare(${i})">&#10005; Remove</span></div>`).join('')
    : `<p style="font-size:11.5px;color:#9aa1aa;text-align:center;margin:2px 0 0">No additional shares yet.</p>`;
  const bar = (t)=>`<div style="background:#1f2329;color:#fff;text-align:center;font-weight:600;padding:7px;font-size:12px;letter-spacing:.3px">${t}</div>`;
  return `<div class="dim" onclick="famCloseShare()"></div>
   <div class="panel" id="sidePanel">
     <div class="ph-head" style="background:#2f5e46"><h4 style="color:#fff">${famSharePlan.name}</h4><div class="x" onclick="famCloseShare()" style="cursor:pointer;color:#fff">&#10005;</div></div>
     <div style="background:#2f5e46;color:#fff;text-align:center;font-size:11.5px;padding:0 12px 9px">Rental Plan of Jordan Lee · ${famSharePlan.bal}</div>
     <div class="pbody">
       ${bar('Relationships')}
       <p style="font-size:12px;text-align:center;margin:10px 4px 8px">Place a check beside clients who are authorized to use sessions from this plan.</p>
       ${relHTML}
       ${bar('Other shares (Non-related)')}
       <p style="font-size:12px;text-align:center;margin:10px 4px 8px">Clients listed below are also authorized to use sessions in this plan. Type a name to add.</p>
       ${sharesHTML}
       <div style="display:flex;gap:8px;justify-content:center;margin-top:10px">
         <input id="fam-share-input" class="form-ctrl" type="text" placeholder="Type a client name…" style="max-width:240px" onkeydown="if(event.key==='Enter'){famAddShare();}">
         <button class="btn" onclick="famAddShare()">Add</button>
       </div>
     </div>
     <div class="pfoot"><span class="sp"></span><span class="btn" onclick="famCloseShare()">Cancel</span><span class="btn primary" onclick="famCloseShare()">Update</span></div>
   </div>`;
}

function bkClientSection(){
  const c = bk.client;
  return `
    <div class="sell-client-wrap${c?' has-client':''}">
      <input class="form-ctrl" id="bk-client-input" type="text" placeholder="Search by name or phone…" autocomplete="off"
        value="${c?c.name:bk.q}"
        oninput="bkSearchClient(this.value)"
        onfocus="bkSearchClient(this.value)"
        onblur="setTimeout(()=>{const d=document.getElementById('bk-client-dd');if(d)d.style.display='none';},150)">
      <button class="sell-client-clear" onclick="bkClearClient()" title="Clear">&#10005;</button>
      <div class="sell-dd" id="bk-client-dd"></div>
    </div>
    ${c ? `<div style="display:flex;align-items:center;gap:6px;margin-top:6px;flex-wrap:wrap">
        <span style="font-size:11.5px;color:#6b7280">${c.dob}${c.dob&&c.phone?' · ':''}${c.phone||''}</span>
        <span class="tag ${c.type==='Member'?'green':'gray'}" style="font-size:10px;padding:1px 5px">${c.type}</span>
      </div>` : `<div style="margin-top:7px;font-size:12px;color:#6b7280">Search for the client who should be billed for this rental.</div>`}
  `;
}

function bkSearchClient(val){
  bk.q = val||'';
  const q = bk.q.toLowerCase().trim();
  if(!q && bk.client){ bk.client = null; bk.method = null; go('sch-choice'); return; }
  const dd = document.getElementById('bk-client-dd');
  if(!dd) return;
  const matches = q ? bkClients.filter(c=>c.name.toLowerCase().includes(q)||c.phone.includes(q)) : bkClients;
  if(!matches.length){ dd.style.display='none'; return; }
  dd.innerHTML = matches.map(c=>{
    const idx = bkClients.indexOf(c);
    const planTag = c.plans.length
      ? `<span class="tag green" style="font-size:9.5px;padding:1px 5px">${c.plans.length} plan${c.plans.length>1?'s':''}</span>`
      : `<span class="tag gray" style="font-size:9.5px;padding:1px 5px">No plans</span>`;
    return `<div class="sell-dd-item" onmousedown="bkPickClient(${idx})">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-weight:600;font-size:12.5px">${c.name}</span>
        <span class="tag ${c.type==='Member'?'green':'gray'}" style="font-size:10px;padding:1px 6px">${c.type}</span>
        ${planTag}
      </div>
      <div style="font-size:11px;color:#6b7280;margin-top:2px">${c.dob}${c.phone?' · '+c.phone:''}</div>
    </div>`;
  }).join('');
  dd.style.display='block';
}

function bkPickClient(idx){ bk.client = bkClients[idx]; bk.method = null; bk.q = ''; bk.payError = null; go('sch-choice'); }
function bkClearClient(){ bk.client = null; bk.method = null; bk.q = ''; bk.payError = null; go('sch-choice'); }

/* Custom-rate expansion: $ amount + unit selector. Shared by 2.1 and 2.2. */
function bkCustomRateFields(){
  return `<div style="margin:-2px 0 10px 26px;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
    <div class="inline-row" style="border:1px solid var(--line);border-radius:5px;background:#fff;padding:0 10px;height:32px;gap:3px">
      <span style="font-size:12px;color:#9aa1aa">$</span>
      <input type="number" style="border:none;background:none;width:70px;font-size:12px;outline:none;color:var(--ink);font-family:inherit" placeholder="0.00" min="0" step="0.01">
    </div>
    <select class="form-ctrl" style="width:160px">
      <option>Per hour</option><option>Per occurrence</option><option>Custom</option>
    </select>
  </div>`;
}

/* Custom rate + No charge rows — appended to both schedule payment-method lists. */
function bkExtraMethods(selected, pickFn){
  const selCustom = selected === 'custom';
  return `
    <div class="radio${selCustom?' on':''}" onclick="${pickFn}('custom')" style="cursor:pointer">
      <span class="dot"></span><div class="t"><b>Custom rate</b><span>Set a one-off price for this booking</span></div></div>
    ${selCustom ? bkCustomRateFields() : ''}
    <div class="radio${selected==='nocharge'?' on':''}" onclick="${pickFn}('nocharge')" style="cursor:pointer">
      <span class="dot"></span><div class="t"><b>No charge</b><span>Book without billing the client</span></div></div>`;
}

function bkPaymentMethodHTML(){
  const c = bk.client;
  const err = bkPayError(bk.payError==='method');
  if(!c){
    const ghost = `
      <div class="radio"><span class="dot"></span><div class="t"><b>Custom rate</b><span>Set a one-off price for this booking</span></div></div>
      <div class="radio"><span class="dot"></span><div class="t"><b>No charge</b><span>Book without billing the client</span></div></div>
      <div class="radio"><span class="dot"></span><div class="t"><b>Use plan — 10-Hour Court Pack</b><span>Plan balance deducts at booking</span></div></div>
      <div class="radio"><span class="dot"></span><div class="t"><b>Pay rental rate</b><span>${BK_RATE_STR}</span></div></div>`;
    return err + `<div style="position:relative">
      <div style="pointer-events:none;opacity:.45">${ghost}</div>
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
        <span style="font-size:11.5px;color:#6b7280;background:#f3f5f6;padding:5px 12px;border-radius:20px;border:1px solid var(--line2);white-space:nowrap">Select or add a client first</span>
      </div>
    </div>`;
  }
  const filter = bk.filter || 'all';
  const first = c.name.split(' ')[0];
  /* Custom rate + No charge only appear under "Show all" */
  const top = (filter==='all') ? bkExtraMethods(bk.method, 'bkPickMethod') : '';
  /* Rental Plans group */
  let plans = '';
  if(filter==='all' || filter==='plans'){
    if(c.plans.length === 0){
      const sellBtn = `<div style="margin-top:8px"><span class="btn sm primary" style="color:#fff" onclick="bksellStart('sch-choice','${c.name}')">Sell Rental Plan</span></div>`;
      plans = c.ratesConfigured
        ? `<div class="banner warn" style="margin-bottom:10px"><span style="font-size:15px;line-height:1">&#9888;&#65039;</span><div><b>${first} has no plan eligible for this rental.</b> Charge the rental rate below, or sell a plan first.${sellBtn}</div></div>`
        : `<div class="banner danger" style="margin-bottom:10px"><span style="font-size:15px;line-height:1">&#128683;</span><div><b>No plan and no rental rate available.</b> Sell ${first} a plan, or configure rental rates for Court 3 to bill this booking.${sellBtn}</div></div>`;
    } else {
      c.plans.forEach(p=>{
        const sel = bk.method === ('plan:'+p.planId);
        let detail;
        if(p.model === 'Per Hour'){
          const left = (p.balance - BK_REQ_HRS).toFixed(1);
          detail = `${p.balance.toFixed(1)} hrs available · deducts <b>${BK_REQ_HRS.toFixed(1)} hrs</b> → ${left} hrs left`;
        } else {
          detail = `${p.balance} plays available · deducts <b>1 play</b> regardless of duration → ${p.balance-1} plays left`;
        }
        plans += `<div class="radio${sel?' on':''}" onclick="bkPickMethod('plan:${p.planId}')" style="cursor:pointer">
            <span class="dot"></span><div class="t"><b>Use plan — ${p.name}</b><span>${detail}</span></div></div>`;
      });
    }
  }
  /* Rental Rates group */
  let rates = '';
  if(filter==='all' || filter==='rates'){
    if(c.ratesConfigured){
      const sel = bk.method === 'rate';
      rates = `<div class="radio${sel?' on':''}" onclick="bkPickMethod('rate')" style="cursor:pointer">
          <span class="dot"></span><div class="t"><b>Pay rental rate</b><span>${BK_RATE_STR}</span></div></div>`;
    } else {
      rates = `<div class="radio" style="opacity:.55;cursor:not-allowed">
          <span class="dot"></span><div class="t"><b>Pay rental rate</b><span style="color:#b07d1a">Rental rate not configured for Court 3 — set up rates in Setup, or use a plan.</span></div></div>`;
    }
  }
  return err + bkFilterChips(filter, 'bkSetFilter') + top + plans + rates;
}

buildNav();
go(location.hash? location.hash.slice(1) : 's-list');
</script>
</body>
</html>
